<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Cutting Tools</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
 
    :root {
      --bg:       #0f0f0f;
      --surface:  #181818;
      --border:   #2a2a2a;
      --text:     #aaaaaa;
      --text-dim: #555;
      --razor:    #b8ccee;
      --scissors: #d4d0a8;
      --box:      #e0933a;
    }
 
    body {
      background: var(--bg);
      color: var(--text);
      font-family: 'Courier New', monospace;
      font-size: 12px;
      height: 100vh;
      overflow: hidden;
      display: flex;
      flex-direction: column;
      cursor: none;
    }
 
    /* ── toolbar ── */
    #toolbar {
      display: flex;
      align-items: center;
      gap: 2px;
      padding: 12px 20px;
      border-bottom: 1px solid var(--border);
      background: var(--surface);
      flex-shrink: 0;
    }
 
    #toolbar span.label {
      color: var(--text-dim);
      letter-spacing: 0.1em;
      margin-right: 10px;
      text-transform: uppercase;
      font-size: 10px;
    }
 
    .tool-btn {
      background: none;
      border: 1px solid var(--border);
      color: var(--text-dim);
      font-family: inherit;
      font-size: 11px;
      letter-spacing: 0.08em;
      padding: 5px 14px;
      cursor: pointer;
      transition: border-color 0.15s, color 0.15s;
      text-transform: uppercase;
    }
 
    .tool-btn:hover { color: var(--text); border-color: #444; }
 
    .tool-btn.active[data-tool="razor"]    { color: var(--razor);    border-color: var(--razor); }
    .tool-btn.active[data-tool="scissors"] { color: var(--scissors); border-color: var(--scissors); }
 
    #hint {
      margin-left: auto;
      color: var(--text-dim);
      font-size: 10px;
      letter-spacing: 0.05em;
    }
 
    /* ── canvas ── */
    #canvas {
      flex: 1;
      display: block;
      width: 100%;
    }
  </style>
</head>
<body>
 
  <div id="toolbar">
    <span class="label">Tool</span>
    <button class="tool-btn active" data-tool="razor"    id="btn-razor">    Razor [1]</button>
    <button class="tool-btn"        data-tool="scissors" id="btn-scissors">  Scissors [2]</button>
    <span id="hint">Del — clear</span>
  </div>
 
  <canvas id="canvas"></canvas>
  <script type="importmap">{ "imports": { "@ixfx":"/ixfx/core.js", "@ixfx/": "/ixfx/" } }</script>
  <script type="module" src="script.js"></script>
</body>
</html>
