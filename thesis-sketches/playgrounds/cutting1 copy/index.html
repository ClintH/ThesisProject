<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<title>Cut</title>
<style>
*, *::before, *::after { box-sizing: border-box; }
html, body {
  margin: 0; padding: 0;
  width: 100%; height: 100%;
  overflow: hidden;
  background: #0f0f0f;
  font-family: -apple-system, BlinkMacSystemFont, 'SF Pro Text', sans-serif;
  color: #ccc;
  user-select: none;
  -webkit-user-select: none;
}

#toolbar {
  height: 48px;
  display: flex;
  align-items: center;
  padding: 0 20px;
  gap: 8px;
  border-bottom: 1px solid #1c1c1c;
  flex-shrink: 0;
}

.btn {
  background: transparent;
  border: 1px solid transparent;
  border-radius: 4px;
  color: #3a3a3a;
  font-size: 11px;
  font-weight: 500;
  letter-spacing: 0.12em;
  text-transform: uppercase;
  padding: 5px 13px;
  cursor: pointer;
  transition: color 0.12s, border-color 0.12s;
  -webkit-tap-highlight-color: transparent;
}
.btn:hover { color: #777; border-color: #2e2e2e; }
.btn.active { color: #d0d0d0; border-color: #4a4a4a; }

canvas {
  display: block;
  cursor: none;
  touch-action: none;
  -webkit-touch-callout: none;
}
</style>
</head>
<body>
<div id="toolbar">
  <button class="btn active" id="btn-razor">Razor</button>
  <button class="btn" id="btn-scissors">Scissors</button>
</div>
<canvas id="c"></canvas>
<script type="module" src="script.js"></script>
<script type="importmap">{ "imports": { "@ixfx":"/ixfx/core.js", "@ixfx/": "/ixfx/" } }</script>
</body>
</html>
